<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nextark</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #5b21b6, #9333ea, #db2777);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      text-align: center;
    }

    .container {
      max-width: 800px;
      padding: 40px;
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    img {
      width: 120px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 3.5em;
      margin: 10px 0;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 1.3em;
      font-weight: 400;
      color: #e5e5e5;
      margin-bottom: 25px;
    }

    p {
      font-size: 1.1em;
      color: #d1d5db;
      line-height: 1.6;
    }

    .highlight {
      margin-top: 30px;
      font-size: 1.4em;
      font-weight: bold;
      color: white;
    }

    .tag {
      margin-top: 15px;
      font-size: 0.9em;
      opacity: 0.7;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>
  <div class="container">
    
    <img src="logo.png" alt="Nextark logo">

    <h1>Nextark</h1>
    <h2>🚧 Under Construction</h2>

    <p>
      A platform for architects seeking the next step in their career.
    </p>

    <p>
      We are building something new — where talent meets opportunity,
      and the future of architecture takes shape.
    </p>

    <div class="highlight">
      What is next for you, architect?
    </div>

    <div class="tag">
      Coming soon
    </div>

  </div>
</body>
</html>
