<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nextark</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #5b21b6, #9333ea, #db2777);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 700px;
      padding: 40px;
    }

    img {
      width: 110px;
      margin-bottom: 25px;
      opacity: 0.95;
    }

    h1 {
      font-size: 3.8em;
      margin: 0;
      letter-spacing: 2px;
    }

    .coming {
      margin-top: 10px;
      font-size: 1em;
      letter-spacing: 3px;
      opacity: 0.7;
    }

    p {
      margin-top: 30px;
      font-size: 1.2em;
      color: #e5e5e5;
      line-height: 1.6;
    }

    .highlight {
      margin-top: 40px;
      font-size: 1.5em;
      font-weight: bold;
    }

    .glow {
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px rgba(255,255,255,0.3);
      }
      to {
        text-shadow: 0 0 20px rgba(255,255,255,0.8);
      }
    }

  </style>
</head>

<body>
  <div class="container">

    <img src="logo.png" alt="Nextark logo">

    <h1 class="glow">Nextark</h1>

    <div class="coming">COMING SOON</div>

    <p>
      Vi bygger en plattform som guidar arkitekter till nästa steg i karriären.
    </p>

    <div class="highlight">
      What is next for you?
    </div>

  </div>
</body>
</html>
